<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Link Circle">
  <!-- Closer to original LC interlocking mark, in a filled circle -->
  <circle cx="64" cy="64" r="64" fill="#790720"/>
  <g fill="#F7FAF9" transform="translate(8 8) scale(0.875)">
    <!-- Vertical of L -->
    <rect x="22" y="22" width="18" height="72" rx="2"/>
    <!-- Base of L linking into C -->
    <rect x="22" y="76" width="48" height="18" rx="2"/>
    <!-- C as thick open ring (gap on right) -->
    <path fill-rule="evenodd" d="M78 24c22.1 0 40 17.9 40 40s-17.9 40-40 40c-11.8 0-22.4-5.1-29.7-13.2l12.8-12.8A23.9 23.9 0 0 0 78 88c13.3 0 24-10.7 24-24S91.3 40 78 40c-7.3 0-13.8 3.2-18.2 8.3L47 35.5C54.5 28.6 65.6 24 78 24z M78 48c8.8 0 16 7.2 16 16s-7.2 16-16 16c-4.2 0-8-1.6-10.9-4.3l-11.4 11.4A31.8 31.8 0 0 0 78 96c17.7 0 32-14.3 32-32S95.7 32 78 32c-9.7 0-18.4 4.3-24.3 11.1l11.5 11.5A15.9 15.9 0 0 1 78 48z"/>
    <!-- Two dots (linked people) -->
    <circle cx="70" cy="42" r="7"/>
    <circle cx="70" cy="86" r="7"/>
  </g>
</svg>
